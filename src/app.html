<!doctype html>
<html lang="en" data-theme="dark">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="South Vancouver Island Tracker — Real-time civic monitoring for the Capital Regional District"
		/>
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<title>SVIT — South Vancouver Island Tracker</title>

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="SVIT — South Vancouver Island Tracker" />
		<meta
			property="og:description"
			content="Real-time civic monitoring dashboard for the Capital Regional District, BC. Track council meetings, development applications, transit, safety alerts, and more."
		/>
		<meta property="og:url" content="https://islandtracker.pro" />
		<meta property="og:image" content="https://islandtracker.pro/og-image.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:locale" content="en_CA" />
		<meta property="og:site_name" content="SVIT" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="SVIT — South Vancouver Island Tracker" />
		<meta
			name="twitter:description"
			content="Real-time civic monitoring dashboard for the Capital Regional District, BC."
		/>
		<meta name="twitter:image" content="https://islandtracker.pro/og-image.png" />

		<!-- JSON-LD Structured Data -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebApplication",
				"name": "SVIT — South Vancouver Island Tracker",
				"description": "Real-time civic monitoring dashboard for the Capital Regional District, British Columbia. Council meetings, bylaws, development applications, transit alerts, safety alerts, and community events.",
				"url": "https://islandtracker.pro",
				"applicationCategory": "GovernmentApplication",
				"operatingSystem": "Any",
				"areaServed": {
					"@type": "AdministrativeArea",
					"name": "Capital Regional District",
					"containedInPlace": {
						"@type": "AdministrativeArea",
						"name": "British Columbia, Canada"
					}
				},
				"offers": {
					"@type": "Offer",
					"price": "0",
					"priceCurrency": "CAD"
				}
			}
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
