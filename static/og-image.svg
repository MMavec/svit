<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="40%" stop-color="#0f1628"/>
      <stop offset="100%" stop-color="#141e38"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#63b3ed" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#68d391" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#805ad5" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Aurora band -->
  <ellipse cx="600" cy="150" rx="700" ry="120" fill="url(#aurora)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1.5" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="350" cy="45" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="580" cy="95" r="1.5" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="820" cy="60" r="1" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="1050" cy="100" r="1.5" fill="#e2e8f0" opacity="0.6"/>
  <circle cx="200" cy="140" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="900" cy="130" r="1" fill="#e2e8f0" opacity="0.3"/>
  <circle cx="700" cy="170" r="1.5" fill="#e2e8f0" opacity="0.4"/>
  <circle cx="450" cy="160" r="1" fill="#e2e8f0" opacity="0.5"/>
  <circle cx="1100" cy="180" r="1" fill="#e2e8f0" opacity="0.3"/>

  <!-- Logo icon -->
  <text x="600" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="64" fill="#63b3ed">&#x25C8;</text>

  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="monospace" font-size="72" font-weight="700" fill="#e2e8f0" letter-spacing="8">SVIT</text>

  <!-- Subtitle -->
  <text x="600" y="385" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="400" fill="#a0aec0">South Vancouver Island Tracker</text>

  <!-- Description -->
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" fill="#8b9bb4">Real-time civic monitoring for the Capital Regional District</text>

  <!-- Feature pills -->
  <g transform="translate(600, 500)">
    <rect x="-390" y="-16" width="110" height="32" rx="16" fill="rgba(99,179,237,0.15)" stroke="rgba(99,179,237,0.3)" stroke-width="1"/>
    <text x="-335" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#63b3ed">Council</text>

    <rect x="-260" y="-16" width="130" height="32" rx="16" fill="rgba(104,211,145,0.15)" stroke="rgba(104,211,145,0.3)" stroke-width="1"/>
    <text x="-195" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#68d391">Development</text>

    <rect x="-110" y="-16" width="100" height="32" rx="16" fill="rgba(246,173,85,0.15)" stroke="rgba(246,173,85,0.3)" stroke-width="1"/>
    <text x="-60" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#f6ad55">Transit</text>

    <rect x="10" y="-16" width="90" height="32" rx="16" fill="rgba(252,129,129,0.15)" stroke="rgba(252,129,129,0.3)" stroke-width="1"/>
    <text x="55" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fc8181">Safety</text>

    <rect x="120" y="-16" width="80" height="32" rx="16" fill="rgba(183,148,244,0.15)" stroke="rgba(183,148,244,0.3)" stroke-width="1"/>
    <text x="160" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#b794f4">News</text>

    <rect x="220" y="-16" width="170" height="32" rx="16" fill="rgba(118,228,247,0.15)" stroke="rgba(118,228,247,0.3)" stroke-width="1"/>
    <text x="305" y="6" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#76e4f7">+ 18 more panels</text>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="622" width="1200" height="8" fill="url(#aurora)" opacity="0.5"/>
</svg>
